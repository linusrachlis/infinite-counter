<!doctype html>
<html>

<head>
    <title>Infinite Counter</title>
    <meta charset=utf8>
    <meta name=viewport content="width=device-width; initial-scale=1">
    <style>
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            font: 48px sans-serif;
        }

        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-size: 1rem;
        }

        @keyframes disappear-up {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100%); opacity: 0; }
        }
        @keyframes disappear-down {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
        @keyframes appear-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes appear-down {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .container {
            height: 100%;
            margin: 0 auto;
            text-align: center;

            display: flex;
            flex-direction: column;

            #counter-container {
                padding-top: 24vh;
                flex-grow: 1;
                font-family: monospace;

                > div { /* Digit group */
                    display: flex;
                    flex-direction: row;
                    justify-content: center;
                    font-size: 16vw;
                    animation-duration: 300ms;
                    animation-fill-mode: forwards;
                    position: absolute;
                    right: 0;

                    &.increment-leaving { animation-name: disappear-up; }
                    &.increment-entering { animation-name: appear-up; }
                    &.decrement-leaving { animation-name: disappear-down; }
                    &.decrement-entering { animation-name: appear-down; }
                }
            }

            .buttons {
                padding: 1em 0;
                button {
                    width: 2em;
                    font-size: 1rem;
                }
            }

            .increment {
                padding: 1em 0;
                input {
                    width: 8em;
                    text-align: center;
                    font-size: 1rem;
                }
            }
        }
    </style>
</head>

<body>
    <div class=container>
        <div id=counter-container></div>
        <div class=buttons>
            <button id=button_plus>+</button>
            <button id=button_minus>-</button>
            <button id=button_times>&times;</button>
            <button id=button_divide>&divide;</button>
        </div>
        <div class=increment>
            <input type=text id=increment_field value=1>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
