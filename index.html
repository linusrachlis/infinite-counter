<!doctype html>
<html>

<head>
    <title>Infinite Counter</title>
    <meta charset=utf8>
    <meta name=viewport content="width=device-width; initial-scale=1">
    <style>
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            font: 48px sans-serif;
        }

        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-size: 1rem;
        }

        @keyframes disappear-up {
            from { top: 0; opacity: 1; }
            to { top: -100%; opacity: 0; }
        }
        @keyframes disappear-down {
            from { top: 0; opacity: 1; }
            to { top: 100%; opacity: 0; }
        }
        @keyframes appear-up {
            from { top: 100%; opacity: 0; }
            to { top: 0; opacity: 1; }
        }
        @keyframes appear-down {
            from { top: -100%; opacity: 0; }
            to { top: 0; opacity: 1; }
        }

        .container {
            height: 100%;
            margin: 0 auto;
            text-align: center;

            display: flex;
            flex-direction: column;

            .counter-container {
                padding-top: 25vh;
                flex-grow: 1;
                font-family: monospace;

                #counter {
                    display: flex;
                    flex-direction: row;
                    font-size: 25vh;

                    >.digit {
                        position: relative;
                        animation-duration: 0.2s;
                        animation-fill-mode: forwards;

                        &.increment-leaving { animation-name: disappear-up; }
                        &.increment-entering { animation-name: appear-up; }
                        &.decrement-leaving { animation-name: disappear-down; }
                        &.decrement-entering { animation-name: appear-down; }
                    }
                }
            }


            .buttons {
                button {
                    width: 2em;
                    font-size: 1rem;
                }
            }

            .increment {
                input {
                    width: 8em;
                    text-align: center;
                    font-size: 1rem;
                }
            }
        }
    </style>
</head>

<body>
    <div class=container>
        <div class=counter-container>
            <div id=counter></div>
        </div>
        <div class=buttons>
            <button id=button_plus>+</button>
            <button id=button_minus>-</button>
            <button id=button_times>&times;</button>
            <button id=button_divide>&divide;</button>
        </div>
        <div class=increment>
            <input type=text id=increment_field value=1>
        </div>
    </div>
    <script>
        "use strict";
        document.addEventListener("DOMContentLoaded", function () {
            let currentValue = 0;
            let shouldCount = false;
            const initialDelayMs = 600;
            const delayDecayFactor = 0.8;
            const minDelayMs = 50;
            const format = Intl.NumberFormat();

            const counterDiv = document.getElementById("counter");
            const plusButton = document.getElementById("button_plus");
            const minusButton = document.getElementById("button_minus");
            const timesButton = document.getElementById("button_times");
            const divideButton = document.getElementById("button_divide");
            const incrementField = document.getElementById("increment_field");

            function getIncrementValue() {
                let incrementValue = parseInt(incrementField.value);
                if (Number.isNaN(incrementValue)) incrementValue = 0;
                return incrementValue;
            }

            function createDigitElement(innerText, leftShiftAmount) {
                const element = document.createElement("div");
                element.classList.add("digit");
                element.style.transform = `translateX(${leftShiftAmount * -100}%)`;
                element.innerText = innerText;
                return element;
            }

            function updateCurrentValue(newValue) {
                const oldDigits = currentValue.toString().split("");
                const newDigits = newValue.toString().split("");
                let cumulativeLeftShiftAmount = 0; // number of digits
                const animiationClassPrefix = newValue > currentValue ? "increment" : "decrement";

                // TODO: more efficient to call replace() or sth?
                counterDiv.innerHTML = "";

                for (let i = 0; i < newDigits.length; i++) {
                    const newDigitElem = createDigitElement(newDigits[i], cumulativeLeftShiftAmount);

                    if (i < oldDigits.length) {
                        // There is a digit in the same place
                        if (oldDigits[i] === newDigits[i]) {
                            // It's the same digit
                            counterDiv.appendChild(newDigitElem);
                        } else {
                            // Digit is being replaced
                            cumulativeLeftShiftAmount++;
                            const oldDigitElem = createDigitElement(oldDigits[i], cumulativeLeftShiftAmount);

                            newDigitElem.classList.add(`${animiationClassPrefix}-entering`);
                            oldDigitElem.classList.add(`${animiationClassPrefix}-leaving`);

                            counterDiv.appendChild(newDigitElem);
                            counterDiv.appendChild(oldDigitElem);
                        }
                    } else {
                        // The number grew to a new length, nothing to compare
                        newDigitElem.classList.add("increment-entering");
                        counterDiv.appendChild(newDigitElem);
                    }
                }
                for (let i = newDigits.length; i < oldDigits.length; i++) {
                    // If the number shrunk to a shorter length, animate the
                    // old digits that are on their way out
                    const oldDigitElem = createDigitElement(oldDigits[i], cumulativeLeftShiftAmount);
                    // FIXME: -leaving assumption breaks for negative numbers
                    oldDigitElem.classList.add(`${animiationClassPrefix}-leaving`);
                    counterDiv.appendChild(oldDigitElem);
                }

                currentValue = newValue;
            }

            function addToValue(mult) {
                updateCurrentValue(currentValue + getIncrementValue() * mult);
            }

            function multiplyValue() {
                updateCurrentValue(currentValue * getIncrementValue());
            }

            function divideValue() {
                updateCurrentValue(Math.round(currentValue / getIncrementValue()));
            }

            function startCounting(callback) {
                shouldCount = true;
                count(callback, initialDelayMs);
            }

            function count(callback, delayMs) {
                if (!shouldCount) return;

                callback();
                const nextDelayMs = Math.max(minDelayMs, delayMs * delayDecayFactor);
                setTimeout(count.bind(null, callback, nextDelayMs), delayMs);
            }

            function stopCounting() {
                shouldCount = false;
            }

            document.addEventListener("pointerdown", function (e) {
                switch (e.target) {
                    case plusButton:
                        startCounting(addToValue.bind(null, 1));
                        break;
                    case minusButton:
                        startCounting(addToValue.bind(null, -1));
                        break;
                    case timesButton:
                        startCounting(multiplyValue);
                        break;
                    case divideButton:
                        startCounting(divideValue);
                        break;
                }
            });

            document.addEventListener("pointerup", function (e) {stopCounting();});
            document.addEventListener("pointercancel", function (e) {stopCounting();});

            document.addEventListener("keydown", function (e) {
                switch (e.key) {
                    case "0":
                    case "1":
                    case "2":
                    case "3":
                    case "4":
                    case "5":
                    case "6":
                    case "7":
                    case "8":
                    case "9":
                        break;
                    case "=":
                    case "+":
                        addToValue(1);
                        e.preventDefault();
                        break;
                    case "-":
                        addToValue(-1);
                        e.preventDefault();
                        break;
                    case "*":
                        multiplyValue();
                        e.preventDefault();
                        break;
                    case "/":
                        divideValue();
                        e.preventDefault();
                        break;
                }
            });

            addToValue(0);
        });
    </script>
</body>

</html>
